<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Inventory System{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            background-color: #1f2937;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            margin-top: 0;
            font-size: 22px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 12px 0;
            padding: 10px;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background-color: #374151;
        }

        .content {
            flex: 1;
            padding: 20px 30px;
        }

        .topbar {
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #374151;
        }

        .card p {
            font-size: 28px;
            margin: 0;
            font-weight: bold;
            color: #111827;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        table th, table td {
            padding: 12px 14px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
        }

        table th {
            background-color: #f9fafb;
        }

        .btn {
            display: inline-block;
            padding: 8px 14px;
            background-color: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .btn-danger {
            background-color: #dc2626;
        }

        .btn-secondary {
            background-color: #6b7280;
        }

        .actions a {
            margin-right: 8px;
        }

        .form-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .form-box p {
            margin-bottom: 14px;
        }

        .form-box input,
        .form-box select {
            width: 100%;
            padding: 8px;
            margin-top: 6px;
        }

        .filter-container {
    max-width: 700px;
    margin: 0 auto 20px auto;
    padding: 20px;
    background: #ffffff;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.filter-row {
    display: flex;
    gap: 20px;
    justify-content: center;
}

.filter-group {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.filter-group input,
.filter-group select {
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
}

.filter-buttons {
    margin-top: 15px;
    text-align: center;
}

.btn-primary {
    padding: 6px 14px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.btn-secondary {
    padding: 6px 14px;
    background: #6b7280;
    color: white;
    border-radius: 6px;
    text-decoration: none;
    margin-left: 10px;
}

.filter-container {
    max-width: 900px;
    margin: 0 auto 20px auto;
    padding: 20px;
    background: #ffffff;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.filter-row {
    display: flex;
    gap: 20px;
    justify-content: center;
    align-items: end;
    flex-wrap: wrap;
}

.filter-group {
    display: flex;
    flex-direction: column;
    width: 250px;
}

.filter-group label {
    margin-bottom: 6px;
    font-weight: 600;
}

.filter-group input,
.filter-group select {
    padding: 8px 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    width: 100%;
    box-sizing: border-box;
}

.filter-buttons {
    margin-top: 15px;
    text-align: center;
}

.btn-primary {
    padding: 8px 14px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    text-decoration: none;
}

.btn-secondary {
    padding: 8px 14px;
    background: #6b7280;
    color: white;
    border-radius: 6px;
    text-decoration: none;
    margin-left: 10px;
    display: inline-block;
}

.chart-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    margin-bottom: 20px;
}

.chart-card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.chart-card h3 {
    margin-top: 0;
    margin-bottom: 15px;
}

.chart-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    margin-bottom: 20px;
}

.chart-card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.chart-card h3 {
    margin-top: 0;
    margin-bottom: 15px;
}

    </style>
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <h2>Inventory</h2>
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <a href="{% url 'category_list' %}">Categories</a>
            <a href="{% url 'product_list' %}">Products</a>
            <a href="{% url 'sale_list' %}">Sales</a>
            <a href="{% url 'sales_summary_report' %}">Sales Report</a>
            <a href="{% url 'logout' %}">Logout</a>
        </div>

        <div class="content">
            <div class="topbar">
                Welcome, <strong>{{ request.user.username }}</strong>
            </div>
{% if messages %}
    <div style="margin-bottom: 20px;">
        {% for message in messages %}
            <div style="
                padding: 12px 16px;
                margin-bottom: 10px;
                border-radius: 8px;
                background-color: #e5f3ff;
                color: #1e3a8a;
                box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            ">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
